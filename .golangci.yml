version: "2"
run:
  go: "1.21"
linters:
  enable:
    - gocritic
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      check-blank: false
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
