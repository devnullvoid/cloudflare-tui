version: "2"
run:
  go: "1.21"
linters:
  enable:
    - gocritic
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      check-blank: false
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
